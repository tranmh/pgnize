name: CI

on:
  push:
    branches: [main]
  pull_request:

# Recognition is pinned to the deterministic fake recognizer everywhere in CI; the real
# Ollama VLM is never exercised here (it is an opt-in `-tags=ollama` harness). The engine→prose
# coach is likewise pinned to the deterministic fake coach so the e2e API boot needs no LLM key.
env:
  RECOGNIZER: fake
  COACH: fake

jobs:
  go-unit:
    name: Go unit + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            chesskit/go.sum
      - name: Vet (workspace)
        run: go vet ./...
      - name: Vet (ollama harness compiles)
        run: go vet -tags=ollama ./internal/recognition/
      - name: Unit tests (internal + cmd)
        run: go test ./internal/... ./cmd/...
      - name: chesskit standalone (no pgnize imports, GOWORK=off)
        run: cd chesskit && GOWORK=off go test ./... -count=1

  go-integration:
    name: Go integration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pgnize
          POSTGRES_PASSWORD: pgnize
          POSTGRES_DB: pgnize_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pgnize"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://pgnize:pgnize@localhost:5432/pgnize_test?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            chesskit/go.sum
      - name: Integration tests
        # Use the Makefile target so CI carries its `-p 1` flag: all integration
        # packages share the single TEST_DATABASE_URL and TRUNCATE it, so they must
        # run serially — parallel package binaries race on the shared DB (flaky 401s,
        # double-claimed jobs). Don't inline a raw `go test` here; it drifts from the target.
        run: make test-int

  web:
    name: Web lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm run test:unit
        working-directory: web
      - run: npm run build
        working-directory: web

  e2e:
    name: E2E (api + ui, fake recognizer)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pgnize
          POSTGRES_PASSWORD: pgnize
          POSTGRES_DB: pgnize
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pgnize"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://pgnize:pgnize@localhost:5432/pgnize?sslmode=disable
      AUTH_SECRET: ci-secret-32-bytes-xxxxxxxxxxxxxx
      STORAGE_DRIVER: filesystem
      STORAGE_DIR: /tmp/pgnize-uploads
      API_ADDR: ":8080"
      PGNIZE_API_BASE: http://localhost:8080
      PGNIZE_WEB_BASE: http://localhost:3000
      PGNIZE_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            chesskit/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            e2e/package-lock.json

      - name: Build & start API (fake recognizer)
        run: |
          go build -o /tmp/pgnize-api ./cmd/api
          /tmp/pgnize-api > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            sleep 1
          done
          curl -sf http://localhost:8080/healthz || { echo "API failed to start"; cat /tmp/api.log; exit 1; }

      - name: Build & start web
        run: |
          npm ci
          npm run build
          npm run start -- -p 3000 > /tmp/web.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/ >/dev/null && break
            sleep 1
          done
          curl -sf http://localhost:3000/ >/dev/null || { echo "web failed to start"; cat /tmp/web.log; exit 1; }
        working-directory: web

      - name: Playwright deps
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run e2e (api + ui)
        run: npm test
        working-directory: e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
