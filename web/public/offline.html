<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PGNize — offline</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #4f46e5 0%, #2563eb 55%, #0ea5e9 100%);
        color: #fff;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 420px; }
      img { width: 96px; height: 96px; margin-bottom: 20px; }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { margin: 0 0 20px; opacity: 0.9; line-height: 1.5; }
      button {
        border: 0;
        border-radius: 9999px;
        padding: 10px 22px;
        font-size: 1rem;
        font-weight: 600;
        color: #1e3a8a;
        background: #fff;
        cursor: pointer;
      }
      button:hover { background: #eef2ff; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo.svg" alt="PGNize" />
      <h1>You're offline</h1>
      <p>
        PGNize needs a connection to recognize score sheets and sync your game
        library. Reconnect and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
